<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>El Marcador — Pronósticos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════
   RESET & VARIABLES
════════════════════════════════════════════════════════ */
:root{
  --v1:#0d3b1a;--v2:#1a5c2a;--v3:#2e7d3f;--v4:#4caf50;
  --do:#f9a825;--do2:#e65100;
  --bg:#111111;--p1:#1e1e1e;--p2:#252525;--p3:#2d2d2d;
  --br:#383838;--br2:#444;
  --tx:#e0e0e0;--tx2:#aaa;--tx3:#666;
  --rd:#e53935;--az:#1565c0;
  --sh:0 4px 24px rgba(0,0,0,.5);
  --ra:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;font-size:15px}
input,select,button,textarea{font-family:'Barlow',sans-serif}
a{color:var(--v4);text-decoration:none}

/* ════════════════════════════════════════════════════════
   HEADER
════════════════════════════════════════════════════════ */
.hdr{
  background:radial-gradient(ellipse at top,#1a5c2a 0%,#0a1a0a 100%);
  padding:32px 16px 24px;text-align:center;position:relative;overflow:hidden;
}
.hdr::before{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 50px,rgba(255,255,255,.015) 50px,rgba(255,255,255,.015) 51px),
    repeating-linear-gradient(90deg,transparent,transparent 50px,rgba(255,255,255,.015) 50px,rgba(255,255,255,.015) 51px);
  pointer-events:none;
}
.hdr-ball{font-size:40px;display:inline-block;animation:spin 10s linear infinite;filter:drop-shadow(0 0 16px rgba(249,168,37,.5))}
@keyframes spin{to{transform:rotate(360deg)}}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,11vw,80px);letter-spacing:8px;color:#fff;text-shadow:0 0 40px rgba(249,168,37,.35);line-height:1;margin:6px 0 3px;position:relative}
.hdr-sub{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:5px;color:var(--do);font-weight:700}
.hdr-badges{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:16px;position:relative}
.badge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 13px;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;color:var(--tx)}
.badge strong{color:var(--do)}

/* ════════════════════════════════════════════════════════
   COUNTDOWN
════════════════════════════════════════════════════════ */
.cdown{background:var(--do);padding:9px 16px;text-align:center;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.cdown-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:#111}
.cdown-val{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:#111}
.cdown.closed{background:var(--rd)}
.cdown.closed .cdown-lbl,.cdown.closed .cdown-val{color:#fff}

/* ════════════════════════════════════════════════════════
   TABS
════════════════════════════════════════════════════════ */
.tabs{display:flex;background:var(--p1);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:100;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:90px;padding:13px 6px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-1px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;color:var(--tx3);cursor:pointer;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--do);border-bottom-color:var(--do)}
.tab-c{display:none;padding:20px 0 80px}
.tab-c.active{display:block}
.wrap{max-width:680px;margin:0 auto;padding:0 14px}

/* ════════════════════════════════════════════════════════
   LOADING SPINNER (FIX #1 — feedback visual rápido)
════════════════════════════════════════════════════════ */
.spin-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:9999;align-items:center;justify-content:center;
}
.spin-overlay.show{display:flex}
.spinner{
  width:48px;height:48px;border:4px solid rgba(249,168,37,.3);
  border-top-color:var(--do);border-radius:50%;
  animation:rotating .7s linear infinite;
}
@keyframes rotating{to{transform:rotate(360deg)}}

/* ════════════════════════════════════════════════════════
   ACCESS GATE
════════════════════════════════════════════════════════ */
.gate{max-width:380px;margin:60px auto 0;padding:0 16px}
.gate-card{background:var(--p1);border:1px solid var(--br);border-radius:var(--ra);padding:32px 24px;text-align:center}
.gate-icon{font-size:44px;margin-bottom:12px}
.gate-card h2{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:#fff;margin-bottom:6px}
.gate-card p{color:var(--tx2);font-size:13px;margin-bottom:20px;line-height:1.5}
.gate-inp{display:flex;gap:8px;margin-bottom:10px}
.gate-inp input{flex:1;background:var(--p2);border:1px solid var(--br);border-radius:8px;padding:13px 14px;color:#fff;font-size:15px;letter-spacing:2px;text-align:center;text-transform:uppercase}
.gate-inp input::placeholder{letter-spacing:1px;text-transform:none;color:#444}
.gate-inp input:focus{outline:none;border-color:var(--v4)}
.gate-err{color:var(--rd);font-size:12px;margin-top:6px;min-height:16px}

/* ════════════════════════════════════════════════════════
   CARDS
════════════════════════════════════════════════════════ */
.card{background:var(--p1);border:1px solid var(--br);border-radius:var(--ra);overflow:hidden;box-shadow:var(--sh);margin-bottom:16px}
.card-hdr{background:linear-gradient(135deg,var(--v2),var(--v1));padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.card-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#fff}
.prize-box{background:rgba(249,168,37,.12);border:1px solid var(--do);border-radius:8px;padding:5px 12px;text-align:center}
.prize-lbl{display:block;font-size:8px;letter-spacing:2px;color:var(--do);font-weight:700}
.prize-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--do)}

/* ════════════════════════════════════════════════════════
   FORM
════════════════════════════════════════════════════════ */
.form-body{padding:20px}
.slbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--do);margin:18px 0 11px;padding-bottom:7px;border-bottom:1px solid var(--br)}
.slbl:first-child{margin-top:0}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:480px){.frow{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--tx3);text-transform:uppercase}
.fg input,.fg select{background:var(--p2);border:1px solid var(--br);border-radius:8px;padding:12px 13px;color:#fff;font-size:14px;transition:border-color .2s;width:100%}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--v4);background:var(--p3)}
.fg input::placeholder{color:#444}
.fg input.err-inp{border-color:var(--rd)}
.err-msg{color:var(--rd);font-size:11px;margin-top:3px}
/* File upload */
.file-wrap input[type=file]{position:absolute;opacity:0;width:0;height:0}
.file-lbl{display:flex;align-items:center;gap:10px;background:var(--p2);border:1px dashed var(--br2);border-radius:8px;padding:12px 13px;cursor:pointer;transition:all .2s;min-height:46px}
.file-lbl:hover{border-color:var(--v4)}
.file-lbl.has-file{border-color:var(--v4);border-style:solid;background:rgba(76,175,80,.06)}
.file-icon{font-size:18px;flex-shrink:0}
.file-txt{font-size:12px;color:var(--tx2);word-break:break-all}
/* Nequi box */
.nq-box{background:rgba(249,168,37,.07);border:1px solid rgba(249,168,37,.2);border-left:3px solid var(--do);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:2px;line-height:1.5}
.nq-box strong{color:var(--do)}
/* Partidos pronos */
.hint{font-size:12px;color:var(--tx2);margin-bottom:12px}
.p-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.p-row{background:var(--p2);border:1px solid var(--br);border-radius:10px;padding:12px 14px;display:grid;grid-template-columns:24px 1fr 80px;align-items:center;gap:10px}
.p-row:focus-within{border-color:var(--v3)}
.p-n{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--do);text-align:center}
.p-info{min-width:0}
.p-match{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-hora{font-size:11px;color:var(--tx3)}
.p-inp{width:76px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;background:var(--bg);border:1px solid var(--br);border-radius:7px;padding:10px 6px;color:#fff;transition:border-color .2s;-webkit-appearance:none}
.p-inp:focus{outline:none;border-color:var(--v4)}
.p-inp.ok{border-color:var(--v4);color:var(--v4)}
.p-inp.bad{border-color:var(--rd)}
/* Legend */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.leg{font-size:11px;padding:3px 9px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:600}
.leg.g{background:rgba(249,168,37,.14);color:var(--do)}
.leg.v{background:rgba(76,175,80,.14);color:var(--v4)}
.leg.d{background:rgba(255,255,255,.05);color:var(--tx3)}
/* Submit */
.btn-sub{width:100%;padding:16px;background:linear-gradient(135deg,var(--v2),var(--v3));border:none;border-radius:10px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(46,125,63,.4);position:relative}
.btn-sub:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(46,125,63,.6)}
.btn-sub:disabled{opacity:.5;cursor:not-allowed}
/* Closed */
.closed-box{padding:48px 20px;text-align:center}
.closed-box .ico{font-size:44px;margin-bottom:12px}
.closed-box h3{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--rd);margin-bottom:6px}
.closed-box p{color:var(--tx2);line-height:1.6;font-size:13px}
/* Confirm */
.confirm-box{background:var(--p1);border:1px solid var(--v3);border-radius:var(--ra);padding:36px 20px;text-align:center;box-shadow:0 0 40px rgba(46,125,63,.2)}
.confirm-box .ico{font-size:52px;margin-bottom:12px}
.confirm-box h2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--v4);margin-bottom:4px}
.confirm-num{font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--do);line-height:1;margin:6px 0 8px}
.confirm-box p{color:var(--tx2);margin-bottom:4px;font-size:13px}
.code-box{background:var(--p2);border:1px solid var(--do);border-radius:8px;padding:12px 16px;margin:14px 0;text-align:center}
.code-lbl{font-size:11px;color:var(--tx2);letter-spacing:1px;margin-bottom:4px}
.code-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:6px;color:var(--do)}
.cp-list{text-align:left;background:var(--p2);border-radius:8px;overflow:hidden;margin-top:12px}
.cp-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--br);font-size:12px}
.cp-row:last-child{border:none}
.cp-score{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--do);letter-spacing:2px}
.cp-match{color:var(--tx2);flex:1;padding-right:10px;font-size:12px}

/* ════════════════════════════════════════════════════════
   TABLA
════════════════════════════════════════════════════════ */
.t-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.t-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px}
.t-status{font-size:11px;color:var(--tx3);background:var(--p1);padding:4px 11px;border-radius:20px;border:1px solid var(--br)}
/* Podio */
.podio{display:flex;gap:8px;margin-bottom:18px}
.podio-b{flex:1;min-width:0;background:var(--p1);border:1px solid var(--br);border-radius:10px;padding:12px 8px;text-align:center}
.podio-b.p1{border-color:var(--do);background:rgba(249,168,37,.07)}
.p-med{font-size:24px;margin-bottom:5px}
.p-nm{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
.p-pts{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--v4)}
.p-prem{font-size:10px;color:var(--do);font-weight:700;margin-top:2px}
/* Table */
.tcard{background:var(--p1);border:1px solid var(--br);border-radius:var(--ra);overflow:hidden;margin-bottom:12px}
table{width:100%;border-collapse:collapse}
thead th{background:var(--v2);padding:10px 8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:#fff;text-align:center}
thead th:nth-child(2){text-align:left}
tbody tr{border-bottom:1px solid var(--br);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody tr:last-child{border:none}
tbody tr.win{background:rgba(249,168,37,.05)}
tbody td{padding:11px 8px;font-size:12px;text-align:center;vertical-align:middle}
tbody td:nth-child(2){text-align:left;font-weight:500;font-size:13px}
@media(max-width:400px){
  thead th:nth-child(4),thead th:nth-child(5),tbody td:nth-child(4),tbody td:nth-child(5){display:none}
}
.pts-c{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--v4)}
.prem-c{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--do)}
.t-nota{font-size:11px;color:var(--tx3);text-align:center;line-height:1.6;padding:0 4px}

/* ════════════════════════════════════════════════════════
   PARTIDOS TAB
════════════════════════════════════════════════════════ */
.stitle{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;margin-bottom:16px}
.pcard{background:var(--p1);border:1px solid var(--br);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:9px}
.pcard-n{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--do);min-width:26px;text-align:center;flex-shrink:0}
.pcard-info{flex:1;min-width:0}
.pcard-match{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:2px}
.pcard-meta{font-size:11px;color:var(--tx3)}
.pcard-score{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--v4);min-width:56px;text-align:center;flex-shrink:0}
.pcard-score.pend{color:var(--tx3);font-size:14px;letter-spacing:1px}

/* ════════════════════════════════════════════════════════
   FAB & MODALS
════════════════════════════════════════════════════════ */
.fab{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:var(--p2);border:1px solid var(--br);font-size:18px;cursor:pointer;z-index:200;transition:all .2s;box-shadow:var(--sh)}
.fab:hover{background:var(--v2);border-color:var(--v4);transform:scale(1.08)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--p1);border:1px solid var(--br);border-radius:var(--ra);padding:24px;width:100%;max-width:440px;position:relative;margin:auto}
.modal.lg{max-width:640px}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;margin-bottom:20px}
.mclose{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--tx3);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s}
.mclose:hover{background:var(--p3);color:#fff}
.merr{color:var(--rd);font-size:12px;margin-top:6px;min-height:16px}

/* ════════════════════════════════════════════════════════
   ADMIN
════════════════════════════════════════════════════════ */
.atabs{display:flex;gap:3px;margin-bottom:20px;background:var(--p2);padding:3px;border-radius:8px;overflow-x:auto}
.atab{flex:1;min-width:80px;padding:9px 6px;background:none;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;color:var(--tx3);cursor:pointer;transition:all .2s;white-space:nowrap}
.atab.active{background:var(--v2);color:#fff}
.ac{display:none}.ac.active{display:block}
.asec{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--br)}
.asec:last-child{border:none;margin:0;padding:0}
.asec h3{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--do);margin-bottom:12px;text-transform:uppercase}
.ahint{font-size:12px;color:var(--tx2);margin-bottom:10px;line-height:1.5}
.aact{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;padding-top:14px;border-top:1px solid var(--br);margin-top:14px}
/* Toggle */
.tog-row{display:flex;align-items:center;gap:10px;margin-top:6px}
.tog{position:relative;display:inline-block;width:40px;height:22px;cursor:pointer;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:#444;border-radius:22px;transition:.3s}
.tog-sl:before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.tog input:checked+.tog-sl{background:var(--v3)}
.tog input:checked+.tog-sl:before{transform:translateX(18px)}
.tog-lbl{font-size:13px;color:var(--tx)}
/* Admin partido row */
.apr{display:grid;grid-template-columns:1fr 1fr 70px 30px;gap:6px;align-items:center;margin-bottom:7px;background:var(--p2);padding:8px 10px;border-radius:8px;border:1px solid var(--br)}
@media(max-width:480px){.apr{grid-template-columns:1fr 1fr;}.apr .aph{display:none}.apr .btn-rm{grid-column:2;justify-self:end}}
.apr input{background:var(--p1);border:1px solid var(--br);border-radius:7px;padding:8px 9px;color:#fff;font-size:13px;width:100%}
.apr input:focus{outline:none;border-color:var(--v4)}
.btn-rm{background:none;border:1px solid var(--br);color:var(--rd);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.btn-rm:hover{background:rgba(229,57,53,.1);border-color:var(--rd)}
/* Resultado row */
.rrow{display:grid;grid-template-columns:1fr 80px;gap:8px;align-items:center;margin-bottom:7px;padding:10px 12px;background:var(--p2);border-radius:8px;border:1px solid var(--br)}
.rmatch{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rinp{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;background:var(--bg);border:1px solid var(--br);border-radius:7px;padding:7px 4px;color:#fff;width:100%}
.rinp:focus{outline:none;border-color:var(--v4)}
/* Inscritos */
.stats{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.spill{background:var(--p2);border:1px solid var(--br);border-radius:20px;padding:5px 13px;font-size:12px}
.spill strong{color:var(--do)}
.irow{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--p2);border-radius:8px;margin-bottom:5px;border:1px solid var(--br);gap:8px}
.irow-info{flex:1;min-width:0}
.iname{font-weight:600;color:#fff;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imeta{color:var(--tx3);font-size:11px;margin-top:2px}
.icode{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--do);flex-shrink:0}
